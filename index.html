<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Mapp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="toolbar">
        <button id="addNode">+ Node</button>
        <button id="addChild">+ Child</button>
        <button id="deleteNode">Delete</button>
        <button id="save">Save</button>
        <button id="load">Load</button>
        <button id="clear">Clear</button>
        <button id="exportPNG">PNG</button>
        <button id="exportJSON">JSON</button>
    </div>
    <div id="style-toolbar">
        <label for="nodeColor">Color:</label>
        <input type="color" id="nodeColor" value="#4a90d9">
        <div id="color-presets">
            <button class="color-preset" data-color="#4a90d9" style="background:#4a90d9" title="Blue"></button>
            <button class="color-preset" data-color="#5cb85c" style="background:#5cb85c" title="Green"></button>
            <button class="color-preset" data-color="#ff6b6b" style="background:#ff6b6b" title="Red"></button>
            <button class="color-preset" data-color="#f0ad4e" style="background:#f0ad4e" title="Orange"></button>
            <button class="color-preset" data-color="#9b59b6" style="background:#9b59b6" title="Purple"></button>
            <button class="color-preset" data-color="#34495e" style="background:#34495e" title="Dark"></button>
        </div>
        <div id="style-options">
            <label>Style:</label>
            <button class="style-btn selected" data-style="filled" title="Filled">●</button>
            <button class="style-btn" data-style="outline" title="Outline">○</button>
            <button class="style-btn" data-style="rounded" title="Rounded">■</button>
        </div>
    </div>
    <div id="zoom-controls" class="zoom-controls">
        <button id="zoomOut" title="Zoom Out (-)">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoomIn" title="Zoom In (+)">+</button>
        <button id="zoomReset" title="Reset View (Ctrl+0)">⟲</button>
    </div>
    <div id="shortcuts-hint">
        <span title="Delete selected node"><kbd>Del</kbd> delete</span>
        <span title="Edit selected node"><kbd>Enter</kbd> edit</span>
        <span title="Close editor"><kbd>Esc</kbd> close</span>
        <span title="Zoom"><kbd>+</kbd><kbd>−</kbd> zoom</span>
        <span title="Pan"><kbd>Space</kbd>+drag</span>
    </div>
    <div id="canvas-container">
        <svg id="connections"></svg>
        <div id="content-layer">
            <div id="nodes"></div>
        </div>
    </div>
    <div id="node-editor" class="hidden">
        <input type="text" id="node-text" placeholder="Node text...">
        <button id="save-text">Save</button>
        <button id="cancel-edit">Cancel</button>
    </div>
    <script src="node_modules/html2canvas/dist/html2canvas.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
