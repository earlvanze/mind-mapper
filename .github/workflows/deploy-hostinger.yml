name: Deploy Mind Mapp to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-mindmapp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add Hostinger cache-control marker
        run: |
          printf 'deployed_at=%s\nsha=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$GITHUB_SHA" > dist/.purge-cache

      - name: Deploy to Hostinger FTP over TLS
        env:
          HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          HOSTINGER_FTP_PW: ${{ secrets.HOSTINGER_FTP_PW }}
        run: |
          : "${HOSTINGER_FTP_HOST:?HOSTINGER_FTP_HOST secret is required}"
          : "${HOSTINGER_FTP_USER:?HOSTINGER_FTP_USER secret is required}"
          : "${HOSTINGER_FTP_PW:?HOSTINGER_FTP_PW secret is required}"
          python3 <<'PY'
          import ftplib
          import os
          from pathlib import Path

          host = os.environ['HOSTINGER_FTP_HOST']
          user = os.environ['HOSTINGER_FTP_USER']
          pw = os.environ['HOSTINGER_FTP_PW']
          src = Path('dist')
          dest = '/public_html/mindmapp'

          def ensure_dir(ftp, path):
              ftp.cwd('/')
              cur = ''
              for part in path.strip('/').split('/'):
                  cur += '/' + part
                  try:
                      ftp.cwd(cur)
                  except Exception:
                      ftp.mkd(cur)
                      ftp.cwd(cur)

          def clear_dir(ftp, path):
              ensure_dir(ftp, path)
              for name, facts in list(ftp.mlsd()):
                  if name in ('.', '..'):
                      continue
                  item = path.rstrip('/') + '/' + name
                  if facts.get('type') == 'dir':
                      clear_dir(ftp, item)
                      ftp.rmd(item)
                  else:
                      ftp.delete(item)

          def upload_tree(ftp, local_root, remote_root):
              for root, _, files in os.walk(local_root):
                  rel = Path(root).relative_to(local_root)
                  remote = remote_root if str(rel) == '.' else remote_root.rstrip('/') + '/' + rel.as_posix()
                  ensure_dir(ftp, remote)
                  for filename in files:
                      local = Path(root) / filename
                      with local.open('rb') as fh:
                          ftp.storbinary('STOR ' + filename, fh)
                      print(f'uploaded {remote}/{filename}')

          with ftplib.FTP_TLS(host, timeout=30) as ftp:
              ftp.login(user, pw)
              ftp.prot_p()
              clear_dir(ftp, dest)
              upload_tree(ftp, src, dest)
          PY

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN secret is required}"
          : "${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID secret is required}"
          curl --fail-with-body -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
