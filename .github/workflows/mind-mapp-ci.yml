name: mind-mapp-ci

on:
  push:
    paths:
      - 'projects/mind-mapp/app/**'
      - '.github/workflows/mind-mapp-ci.yml'
  pull_request:
    paths:
      - 'projects/mind-mapp/app/**'
      - '.github/workflows/mind-mapp-ci.yml'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/mind-mapp/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/mind-mapp/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
